services:
  postgres-primary:
    image: postgres:17
    container_name: comogastoapp-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "${POSTGRES_PRIMARY_PORT}:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./infra/postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - comogastoapp-net

  postgres-replica:
    image: postgres:17
    container_name: comogastoapp-postgres-replica
    restart: unless-stopped
    depends_on:
      - postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_PRIMARY_HOST: postgres-primary
    ports:
      - "${POSTGRES_REPLICA_PORT}:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica/replica-init.sh:/replica-init.sh
    entrypoint: [ "bash", "/replica-init.sh" ]
    networks:
      - comogastoapp-net

  kafka:
    image: bitnami/kafka:latest
    container_name: comogastoapp-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_BROKER_PORT}:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - comogastoapp-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comogastoapp-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: comogastoapp-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - comogastoapp-net

  redis:
    image: redis:7.4-alpine
    container_name: comogastoapp-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - comogastoapp-net

  portainer:
    image: portainer/portainer-ce:latest
    container_name: comogastoapp-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - comogastoapp-net

volumes:
  postgres_primary_data:
  postgres_replica_data:
  kafka_data:
  redis_data:
  portainer_data:

networks:
  comogastoapp-net:
    name: comogastoapp-net
    driver: bridge