services:
  postgres-primary:
    image: postgres:17
    container_name: comogastoapp-postgres-primary
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
    ports:
      - "${POSTGRES_PRIMARY_PORT}:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./infra/postgres/primary/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./infra/postgres/primary/pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh
    command: >
      postgres
      -c config_file=/etc/postgresql/postgresql.conf
      -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - comogastoapp-net

  postgres-replica:
    image: postgres:17
    container_name: comogastoapp-postgres-replica
    restart: unless-stopped
    depends_on:
      - postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRES_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRES_PRIMARY_HOST: postgres-primary
    ports:
      - "${POSTGRES_REPLICA_PORT}:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./infra/postgres/replica/replica-init.sh:/replica-init.sh
    entrypoint: [ "bash", "-c", "tr -d '\\r' < /replica-init.sh > /tmp/replica-init.sh && chmod +x /tmp/replica-init.sh && bash /tmp/replica-init.sh" ]
    networks:
      - comogastoapp-net

  kafka:
    image: apache/kafka:3.9.0
    container_name: comogastoapp-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_BROKER_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - comogastoapp-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: comogastoapp-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: comogastoapp-platform
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - comogastoapp-net

  redis:
    image: redis:7.4-alpine
    container_name: comogastoapp-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - comogastoapp-net

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: comogastoapp-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    command: -redis-addr=redis://comogastoapp-redis:6379 -redis-password=comogasto-app-redis
    networks:
      - comogastoapp-net
    depends_on:
      - redis

  portainer:
    image: portainer/portainer-ce:latest
    container_name: comogastoapp-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - comogastoapp-net

  pmm-server:
    image: percona/pmm-server:latest
    container_name: comogastoapp-pmm-server
    restart: unless-stopped
    ports:
      - "${PMM_SERVER_PORT}:8443"
      - "443:8443"
      - "3000:3000"
    volumes:
      - pmm_server_data:/srv
    environment:
      DISABLE_UPDATES: "true"
      METRICS_RETENTION: "2592000"
    networks:
      - comogastoapp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -k -f https://localhost:8443/graph/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  pmm-agent-postgres-primary:
    image: percona/pmm-client:latest
    container_name: comogastoapp-pmm-agent-postgres-primary
    restart: unless-stopped
    depends_on:
      - pmm-server
      - postgres-primary
    environment:
      PMM_AGENT_SETUP: 1
      PMM_AGENT_SETUP_FORCE: 1
      PMM_AGENT_CONFIG_FILE: /usr/local/percona/pmm/config/pmm-agent.yaml
      PMM_AGENT_SETUP_NODE_TYPE: container
      PMM_AGENT_SETUP_NODE_NAME: comogastoapp-postgres-primary-node
      PMM_AGENT_SERVER_ADDRESS: pmm-server:8443
      PMM_AGENT_SERVER_INSECURE_TLS: 1
      PMM_AGENT_SERVER_USERNAME: ${PMM_ADMIN_USER}
      PMM_AGENT_SERVER_PASSWORD: ${PMM_ADMIN_PASSWORD}
      PMM_AGENT_PRERUN_SCRIPT: >
        until pmm-admin add postgresql --service-name=comogastoapp-postgres-primary --host=postgres-primary --port=5448 --username='${POSTGRES_USER}' --password='${POSTGRES_PASSWORD}'; do
          echo 'Waiting PMM registration for primary...';
          sleep 5;
        done
      PMM_ADMIN_USER: ${PMM_ADMIN_USER}
      PMM_ADMIN_PASSWORD: ${PMM_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - comogastoapp-net

  pmm-agent-postgres-replica:
    image: percona/pmm-client:latest
    container_name: comogastoapp-pmm-agent-postgres-replica
    restart: unless-stopped
    depends_on:
      - pmm-server
      - postgres-replica
    environment:
      PMM_AGENT_SETUP: 1
      PMM_AGENT_SETUP_FORCE: 1
      PMM_AGENT_CONFIG_FILE: /usr/local/percona/pmm/config/pmm-agent.yaml
      PMM_AGENT_SETUP_NODE_TYPE: container
      PMM_AGENT_SETUP_NODE_NAME: comogastoapp-postgres-replica-node
      PMM_AGENT_SERVER_ADDRESS: pmm-server:8443
      PMM_AGENT_SERVER_INSECURE_TLS: 1
      PMM_AGENT_SERVER_USERNAME: ${PMM_ADMIN_USER}
      PMM_AGENT_SERVER_PASSWORD: ${PMM_ADMIN_PASSWORD}
      PMM_AGENT_PRERUN_SCRIPT: >
        until pmm-admin add postgresql --service-name=comogastoapp-postgres-replica --host=postgres-replica --port=5449 --username='${POSTGRES_USER}' --password='${POSTGRES_PASSWORD}'; do
          echo 'Waiting PMM registration for replica...';
          sleep 5;
        done
      PMM_ADMIN_USER: ${PMM_ADMIN_USER}
      PMM_ADMIN_PASSWORD: ${PMM_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - comogastoapp-net

volumes:
  postgres_primary_data:
  postgres_replica_data:
  kafka_data:
  redis_data:
  portainer_data:
  pmm_server_data:

networks:
  comogastoapp-net:
    name: comogastoapp-net
    driver: bridge