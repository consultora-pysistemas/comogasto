listen_addresses = '*'

wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

shared_buffers = 256MB
work_mem = 16MB
maintenance_work_mem = 128MB

max_connections = 300

log_destination = 'stderr'
logging_collector = off
log_statement = 'none'
log_min_duration_statement = 1000

timezone = 'UTC'