global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "tenant-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tenant-service:8081"]

  - job_name: "auth-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["auth-service:8082"]

  - job_name: "iam-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["iam-service:8083"]

  - job_name: "audit-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["audit-service:8084"]

  - job_name: "tracing-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["tracing-service:8086"]

  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["notification-service:8087"]